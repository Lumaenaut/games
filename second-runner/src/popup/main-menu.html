<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SECOND RUNNER</title>
  <link rel="stylesheet" href="main-menu.css">
</head>
<body>
  <div class="header">
    <div class="title-section">
      <h1>Second Runner</h1>
    </div>
  </div>

  <div class="game-buttons">
    <button class="game-button" id="game-tennis">
      <span class="game-icon">🕹️</span>
      <span class="game-title">tennis</span>
      <span class="game-description">flip & score</span>
    </button>
    
    <button class="game-button" id="game-hockey">
      <span class="game-icon">👾</span>
      <span class="game-title">hockey</span>
      <span class="game-description">defend earth</span>
    </button>
    
    <button class="game-button" id="game-handball">
      <span class="game-icon">🧮</span>
      <span class="game-title">handball</span>
      <span class="game-description">quick calc</span>
    </button>
  </div>

  <script src="main-menu.js"></script>
</body>
</html>
