<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SR . HANDBALL</title>
  <link rel="stylesheet" href="handball.css">
</head>
<body>
  <div class="game-container">
    <div class="game-header">
      <div class="scores">
        <div class="score">PLAYER: <span id="player-score">0</span></div>
        <div class="score">COMPUTER: <span id="computer-score">0</span></div>
      </div>
      <button class="back-button" id="back-button">BACK TO MENU</button>
    </div>

    <div class="game-area">
      <canvas id="game-canvas" width="400" height="350"></canvas>
    </div>

    <div class="game-controls">
      <p>YOU CONTROL THE BLACK PADDLE. MOVE MOUSE UP/DOWN.</p>
    </div>
  </div>

  <script src="handball.js"></script>
</body>
</html>
