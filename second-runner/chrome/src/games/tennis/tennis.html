<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SR . Tennis</title>
  <link rel="stylesheet" href="tennis.css">
</head>
<body>
  <div class="game-container">
    <div class="game-header">
      <div class="scores">
        <div class="score">Player: <span id="player-score">0</span></div>
        <div class="score">Computer: <span id="computer-score">0</span></div>
      </div>
      <button class="back-button" id="back-button">BACK TO MENU</button>
    </div>

    <div class="game-area">
      <canvas id="game-canvas" width="600" height="350"></canvas>
    </div>

    <div class="game-controls">
      <p>Move your mouse up and down to control the paddle</p>
    </div>
  </div>

  <script src="tennis.js"></script>
</body>
</html>
